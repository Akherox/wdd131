<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brazil - WDD 131 - Bryan Bravo</title>
    <meta name="description"
        content="A country profile page for Brazil, built for WDD 131 - Dynamic Web Fundamentals, by Bryan Bravo. Includes country data and current weather conditions.">
    <meta name="author" content="Bryan Bravo">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600&family=Poppins:wght@600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="styles/place.css">
    <link rel="stylesheet" href="styles/place-large.css">

    <script src="scripts/place.js" defer></script>
</head>

<body>
    <header class="body-header">
        <h1 id="course-title">Brazil</h1>
    </header>

    <main>
        <div class="hero">
            <picture>
                <source srcset="images/hero-desktop.webp" media="(min-width: 800px)">
                <img src="./images/hero-mobile.webp" alt="Cristo Redentor no Rio de Janeiro, Brasil" width="800"
                    height="1200">
            </picture>

            <section class="card card-data">
                <h2>Data</h2>
                <dl>
                    <div class="row">
                        <dt>Area:</dt>
                        <dd>8,515,767 sq km</dd>
                    </div>
                    <div class="row">
                        <dt>Population:</dt>
                        <dd>203,080,756</dd>
                    </div>
                    <div class="row">
                        <dt>Capital:</dt>
                        <dd>Bras&iacute;lia</dd>
                    </div>
                    <div class="row">
                        <dt>Languages:</dt>
                        <dd>Portuguese</dd>
                    </div>
                    <div class="row">
                        <dt>Currency:</dt>
                        <dd>Brazilian Real</dd>
                    </div>
                    <div class="row">
                        <dt>Time Zone:</dt>
                        <dd>UTC-3</dd>
                    </div>
                    <div class="row">
                        <dt>Calling Code:</dt>
                        <dd>+55</dd>
                    </div>
                    <div class="row">
                        <dt>Internet TLD:</dt>
                        <dd>.br</dd>
                    </div>
                </dl>
            </section>

            <section class="card card-weather">
                <h2 class="weather-heading">Weather</h2>
                <img class="weather-icon" src="./images/weather-icon.svg" alt="Partly sunny weather icon" width="60"
                    height="60">
                <dl>
                    <div class="row">
                        <dt>Temperature:</dt>
                        <dd id="temperature">28 &deg;C</dd>
                    </div>
                    <div class="row">
                        <dt>Conditions:</dt>
                        <dd id="conditions">Sunny</dd>
                    </div>
                    <div class="row">
                        <dt>Wind:</dt>
                        <dd id="wind">12 km/h</dd>
                    </div>
                    <div class="row">
                        <dt>Wind Chill:</dt>
                        <dd id="windChill">N/A</dd>
                    </div>
                </dl>
            </section>
        </div>
    </main>

    <footer>
        <p>&copy; <span id="currentyear"></span> Bryan Bravo, Brazil</p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
